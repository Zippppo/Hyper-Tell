schema_version: 1
project: Body-Tell VoxTell alignment
created_at: '2026-05-24'
lead_plan: lead.html
status_model:
  todo: Task is defined but not currently runnable.
  ready: Task dependencies are accepted and the task can be assigned.
  assigned: A worker run has been started.
  submitted: Worker produced a result and is waiting for manager review.
  needs_fix: Review failed; rerun the same worker with the review notes.
  gate_failed: Review accepted or looked complete, but a required integration gate failed or was missing.
  blocked: Task cannot move without human input or an external artifact.
  accepted: Manager accepted the result and appended progress to lead.html.
required_gates:
  tdd_test_quality:
    pass_condition: REVIEW.html records Test quality as pass and Targeted pytest as pass.
    artifact_policy: Record focused test paths, regression coverage, red evidence, targeted pytest command, and targeted
      pytest result in REVIEW.html.
  phase1_slurm:
    command: sbatch slurm/body-tell-phase1.sh
    accounting_command: sacct -j <JOB_ID> --format=JobID,State,ExitCode,Elapsed -n
    pass_condition: Main job state is COMPLETED and exit code is 0:0.
    artifact_policy: Record job id, command, final state, exit code, elapsed time, and the smallest relevant failure excerpt
      in REVIEW.html or runs/<TASK_ID>/GATE.html.
global_rules:
- Use conda environment voxtell for verification commands.
- Reports and run results must be written as HTML.
- lead.html is owned only by the manager.
- Workers must not edit lead.html or workflow_manifest.yaml.
- Workers must keep changes limited to the assigned task and plan file.
- Workers must follow TDD: focused test first, red evidence, implementation, green evidence.
- Long-lived dispatcher sessions must use only targeted manifest entries and compact artifact summaries; do not read legacy
  child event logs.
- Reviewers must review test quality before implementation and may accept only when Test quality and Targeted pytest both
  pass.
- Reviewers must submit slurm/body-tell-phase1.sh and may accept only when the main job is COMPLETED with exit code 0:0.
- Rerun prompts must include the current manager note so workers address needs_fix or gate_failed causes directly.
- Run one worker/reviewer cycle at a time unless the user explicitly asks for parallel lanes.
- Commit only after the task is accepted and all required gates pass; keep workflow-infrastructure commits separate from worker
  implementation commits.
agents:
  manager:
    role: Dispatcher that owns lead.html, selects runnable tasks, spawns worker/reviewer subagents, and records accepted
      progress.
    writable:
    - Body-Tell/reports/26-05-24/lead.html
    - Body-Tell/reports/26-05-24/workflow_manifest.yaml
    - Body-Tell/reports/26-05-24/runs/**
  reviewer:
    role: Reviews a submitted worker result against the plan, git diff, tests, acceptance criteria, and required phase1 Slurm
      gate.
    writable:
    - Body-Tell/reports/26-05-24/runs/**/REVIEW.html
  sp_a_architecture_worker:
    role: Implements SP-A model architecture, VoxTell compatibility, weight loading, and experiment matrix work.
    plan_file: bodytell_voxtell_alignment_plan_2026-05-24.html
    writable:
    - Body-Tell/body_tell/models/**
    - Body-Tell/body_tell/losses/**
    - Body-Tell/configs/**
    - Body-Tell/scripts/**
    - Body-Tell/tests/**
    - Body-Tell/reports/26-05-24/runs/**
  sp_b_sampling_vocab_worker:
    role: Implements SP-B sampling, prompt/vocabulary, aggregate concept, and embedding-cache work.
    plan_file: bodytell_sampling_vocabulary_optimization_report.html
    writable:
    - Body-Tell/body_tell/data/**
    - Body-Tell/configs/**
    - Body-Tell/scripts/**
    - Body-Tell/tests/**
    - Body-Tell/reports/26-05-24/runs/**
  sp_c_training_eval_worker:
    role: Implements SP-C training loop, optimizer/scheduler, checkpoint, deep supervision, and evaluation work.
    plan_file: bodytell_training_loop_eval_alignment_plan_2026-05-24.html
    writable:
    - Body-Tell/train.py
    - Body-Tell/body_tell/losses/**
    - Body-Tell/body_tell/metrics/**
    - Body-Tell/configs/**
    - Body-Tell/tests/**
    - Body-Tell/reports/26-05-24/runs/**
